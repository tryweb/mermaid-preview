<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mermaid Live Preview Tool</title>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    window.mermaid = mermaid;

    mermaid.initialize({
      startOnLoad: false,
      theme: 'default',
      securityLevel: 'loose',
    });
  </script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: #f5f6f8;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .editor-panel {
      width: 50%;
      border-right: 1px solid #ddd;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
    }

    .preview-panel {
      width: 50%;
      background: #ffffff;
      overflow: auto;
      position: relative;
    }

    .panel-title {
      padding: 12px 16px;
      font-size: 14px;
      font-weight: bold;
      background: #2d2d2d;
      color: #fff;
      border-bottom: 1px solid #444;
    }

    textarea {
      flex: 1;
      width: 100%;
      border: none;
      outline: none;
      resize: none;
      padding: 16px;
      font-size: 14px;
      line-height: 1.6;
      font-family: Consolas, Monaco, monospace;
      background: #1e1e1e;
      color: #dcdcdc;
    }

    #preview {
      padding: 20px;
      min-height: 100%;
    }

    .error-box {
      margin: 16px;
      padding: 14px;
      border-radius: 8px;
      background: #fff0f0;
      border: 1px solid #ffb3b3;
      color: #b30000;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .status-bar {
      padding: 8px 16px;
      font-size: 12px;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
      color: #666;
    }

    .success {
      color: #0b7a0b;
    }

    .error {
      color: #c62828;
    }

    svg {
      max-width: 100%;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- 左側編輯區 -->
  <div class="editor-panel">
    <div class="panel-title">
      Mermaid Code Editor
    </div>

    <textarea id="codeInput">
flowchart TD

A[開始] --> B{是否登入?}

B -->|是| C[進入系統]
B -->|否| D[導向登入頁]

C --> E[顯示 Dashboard]
D --> F[等待使用者登入]
    </textarea>

    <div class="status-bar" id="statusBar">
      Ready
    </div>
  </div>

  <!-- 右側預覽區 -->
  <div class="preview-panel">
    <div class="panel-title" style="background:#fafafa;color:#333;border-bottom:1px solid #ddd;">
      Mermaid Preview
    </div>

    <div id="preview"></div>
  </div>

</div>

<script type="module">

const textarea = document.getElementById('codeInput');
const preview = document.getElementById('preview');
const statusBar = document.getElementById('statusBar');

let renderTimer = null;

async function renderMermaid() {

  const code = textarea.value;

  clearTimeout(renderTimer);

  renderTimer = setTimeout(async () => {

    try {

      preview.innerHTML = '';

      // 驗證 Mermaid Syntax
      await window.mermaid.parse(code);

      // Render SVG
      const renderId = 'mermaid-' + Date.now();

      const result = await window.mermaid.render(renderId, code);

      preview.innerHTML = result.svg;

      statusBar.innerHTML =
        '<span class="success">✓ Mermaid Render Success</span>';

    } catch (err) {

      console.error(err);

      let message = err?.message || String(err);

      // 嘗試解析錯誤行號
      let lineInfo = '';

      const lineMatch =
        message.match(/line (\d+)/i) ||
        message.match(/on line (\d+)/i);

      if (lineMatch) {
        lineInfo = `\n\n錯誤行數: 第 ${lineMatch[1]} 行`;
      }

      preview.innerHTML = `
        <div class="error-box">
          <strong>Mermaid Syntax Error</strong>

${message}${lineInfo}
        </div>
      `;

      statusBar.innerHTML =
        '<span class="error">✗ Mermaid Render Failed</span>';
    }

  }, 300);
}

// 即時更新
textarea.addEventListener('input', renderMermaid);

// 初始 render
renderMermaid();

</script>

</body>
</html>
